name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/memstored
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Flag failed image build
        if: failure() && steps.build.outcome == 'failure'
        run: |
          echo "### :rotating_light: memstored image build failed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`ghcr.io/${{ github.repository_owner }}/memstored:latest\` was NOT updated -- the deployed daemon on docker-memstore is now stale relative to main." >> "$GITHUB_STEP_SUMMARY"
